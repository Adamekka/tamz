<!DOCTYPE html>
<html>

<!-- =============================================================
    TODO 1: Přidání důležitých termínů
    =============================================================
    Vytvořte novou ion-card, ve které zobrazíte 3 důležité termíny
    (např. konec semestru, zkouška, servis ...).

    Harmonogram semestru: https://www.vsb.cz/cs/student/harmonogram/
    Ověření výsledků: https://www.timeanddate.com/date/durationresult.html
-->

<!-- =============================================================
    TODO 2: Barevné rozlišení zbývajících dnů
    =============================================================
    Podle počtu zbývajících dnů změňte barvu textu termínu, například:
    - méně než 7 dnů   → červeně 
    - méně než 30 dnů  → oranžově 
    - 30 a více dnů    → zeleně 
    - v minulosti      → šedě
-->

<!-- =============================================================
    TODO 3: Progress bar průběhu semestru
    =============================================================
    Přidejte ion-card s komponentou ion-progress-bar, která
    zobrazí, kolik procent semestru již uběhlo.

    Dokumentace: https://ionicframework.com/docs/api/progress-bar
-->

<!-- =============================================================
    TODO 4: Toast upozornění na blízké termíny
    =============================================================
    Při načtení stránky zkontrolujte, zda je některý termín
    za 7 nebo méně dnů. Pokud ano, zobrazte ion-toast
    s upozorněním.

    Dokumentace: https://ionicframework.com/docs/api/toast
-->

<!-- =============================================================
    BONUS: Živý odpočet v reálném čase
    =============================================================
    Přidejte kartu, která zobrazuje odpočet do konce semestru například
    ve formátu: "93d 14h 23m 45s" a aktualizuje se každou sekundu.

    HINT: Použijte setInterval
-->

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" rel="stylesheet">
</head>

<body>
  <ion-app>

    <ion-header>
      <ion-toolbar>
        <ion-title>Termíny</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding">

      <!-- Karta: Aktualni datum -->
      <ion-card>
        <ion-card-content>
          <ion-text id="actualDate" style="display: block; font-size:110%; padding-bottom: 5px">
            Dnešní datum: 00/00/0000
          </ion-text>
        </ion-card-content>
      </ion-card>

      <!-- Karta: Ukazka ion-datetime -->
      <ion-card>
        <ion-card-content>
          <ion-text style="display: block; font-size:150%; text-align: center;">
            Zadej datum
          </ion-text>
          <p style="text-align: center; padding-bottom: 5px">
            <ion-datetime-button datetime="datetime"></ion-datetime-button>
            <ion-modal>
              <ion-datetime id="datetime" locale="cs-CZ" presentation="date" show-default-buttons="true"></ion-datetime>
            </ion-modal>
          </p>
          <ion-text id="selectedDate" style="display: block; font-size:110%; padding-top: 5px; padding-bottom: 5px">
            Zvolené datum: ---
          </ion-text>
        </ion-card-content>
      </ion-card>

      <!-- Dulezite terminy -->
      <ion-card>
        <ion-card-content>
          <ion-text id="konecSemestru" style="display: block; font-size:110%; padding-bottom: 5px">
            Konec výuky v letním semestru: 16. 5. 2026
          </ion-text>

          <ion-text id="zkouska" style="display: block; font-size:110%; padding-bottom: 5px">
            Začátek zkouškového období: 18. 5. 2026
          </ion-text>

          <ion-text id="servis" style="display: block; font-size:110%; padding-bottom: 5px">
            Konec zkouškového období: 27. 6. 2026
          </ion-text>
        </ion-card-content>
      </ion-card>

      <ion-card>
        <ion-card-content>
          <ion-text id="semesterProgressText">
            Průběh semestru: 0 %
          </ion-text>
          <ion-progress-bar id="semesterProgress" value="0"></ion-progress-bar>
        </ion-card-content>
      </ion-card>

    </ion-content>

  </ion-app>

  <script>
    document.getElementById('actualDate').innerText = "Dnešní datum: " + new Date().toLocaleDateString('cs-CZ');

    const DATES = {
      LETNI_SEMESTR_START: new Date(2026, 1, 16),
      KONEC_VYUKY_LETNI: new Date(2026, 4, 16),
      ZKOUSKOVE_LETNI_START: new Date(2026, 4, 18),
      ZKOUSKOVE_LETNI_END: new Date(2026, 5, 27)
    };
    const DAY_MS = 24 * 60 * 60 * 1000;

    let dateTimeHtml = document.getElementById('datetime');
    dateTimeHtml.addEventListener("ionChange", function (e) {
      const value = String(this.value || "");
      const [year, month, day] = value.slice(0, 10).split('-').map(Number);
      let selected = (year && month && day)
        ? new Date(year, month - 1, day)
        : new Date();

      let selectedDateHtml = document.getElementById('selectedDate');
      selectedDateHtml.innerText = "Zvolené datum: " + selected.toLocaleDateString('cs-CZ');

      let today = new Date(selected.getFullYear(), selected.getMonth(), selected.getDate());
      updateSemesterProgress(today);

      let konecSemestru = DATES.KONEC_VYUKY_LETNI;
      let zkouska = DATES.ZKOUSKOVE_LETNI_START;
      let servis = DATES.ZKOUSKOVE_LETNI_END;

      const konecSemestruDiff = konecSemestru - today;
      const zkouskaDiff = zkouska - today;
      const servisDiff = servis - today;

      // Konec semestru
      if (konecSemestruDiff < 0) {
        document.getElementById('konecSemestru').style.color = "gray";
      } else if (konecSemestruDiff < 7 * 24 * 60 * 60 * 1000) {
        document.getElementById('konecSemestru').style.color = "red";
      } else if (konecSemestruDiff < 30 * 24 * 60 * 60 * 1000) {
        document.getElementById('konecSemestru').style.color = "orange";
      } else {
        document.getElementById('konecSemestru').style.color = "green";
      }

      // Zkouška
      if (zkouskaDiff < 0) {
        document.getElementById('zkouska').style.color = "gray";
      } else if (zkouskaDiff < 7 * 24 * 60 * 60 * 1000) {
        document.getElementById('zkouska').style.color = "red";
      } else if (zkouskaDiff < 30 * 24 * 60 * 60 * 1000) {
        document.getElementById('zkouska').style.color = "orange";
      } else {
        document.getElementById('zkouska').style.color = "green";
      }

      // Servis
      if (servisDiff < 0) {
        document.getElementById('servis').style.color = "gray";
      } else if (servisDiff < 7 * 24 * 60 * 60 * 1000) {
        document.getElementById('servis').style.color = "red";
      } else if (servisDiff < 30 * 24 * 60 * 60 * 1000) {
        document.getElementById('servis').style.color = "orange";
      } else {
        document.getElementById('servis').style.color = "green";
      }

      document.getElementById('konecSemestru').innerText = "Konec výuky v letním semestru: " + konecSemestru.toLocaleDateString('cs-CZ');
      document.getElementById('zkouska').innerText = "Začátek zkouškového období: " + zkouska.toLocaleDateString('cs-CZ');
      document.getElementById('servis').innerText = "Konec zkouškového období: " + servis.toLocaleDateString('cs-CZ');
    });

    let progressBar = document.getElementById('semesterProgress');
    let progressText = document.getElementById('semesterProgressText');

    function updateSemesterProgress(referenceDate) {
      let startSemestru = DATES.LETNI_SEMESTR_START;
      let konecSemestru = DATES.KONEC_VYUKY_LETNI;

      let totalMs = konecSemestru - startSemestru;
      let elapsedMs = referenceDate - startSemestru;
      let progress = elapsedMs / totalMs;

      if (progress < 0) {
        progress = 0;
      } else if (progress > 1) {
        progress = 1;
      }

      progressBar.value = progress;
      progressText.innerText = "Průběh semestru: " + Math.round(progress * 100) + " %";
    }

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    async function showNearDeadlinesToast() {
      let today = startOfDay(new Date());
      let deadlines = [
        { label: "Konec výuky v letním semestru", date: DATES.KONEC_VYUKY_LETNI },
        { label: "Začátek zkouškového období", date: DATES.ZKOUSKOVE_LETNI_START },
        { label: "Konec zkouškového období", date: DATES.ZKOUSKOVE_LETNI_END }
      ];

      let upcoming = deadlines
        .map((deadline) => {
          return {
            label: deadline.label,
            daysLeft: Math.round((deadline.date - today) / DAY_MS)
          };
        })
        .filter((deadline) => deadline.daysLeft >= 0 && deadline.daysLeft <= 7);

      if (upcoming.length === 0) {
        return;
      }

      let listUpcoming = upcoming.map((deadline) => `${deadline.label} (${deadline.daysLeft} dní)`).join(", ");

      let toast = document.createElement('ion-toast');
      toast.message = listUpcoming;
      toast.buttons = [{ text: 'OK', role: 'cancel' }];

      document.body.appendChild(toast);
      await toast.present();
      toast.addEventListener('didDismiss', function () {
        toast.remove();
      });
    }

    updateSemesterProgress(new Date());
    showNearDeadlinesToast();
  </script>
</body>

</html>
